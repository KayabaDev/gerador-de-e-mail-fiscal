<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de E-mail Fiscal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    h1 { font-size: 22px; font-weight: 600; color: #111; }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 1rem;
    }

    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { font-size: 14px; color: #555; }

    input[type="text"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      color: #111;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: #4f8ef7; }

    .check-group { display: flex; flex-direction: column; gap: 10px; }

    .group-block {
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #fafafa;
    }

    .group-block-label {
      font-size: 11px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .check-item { display: flex; align-items: flex-start; gap: 10px; cursor: pointer; }
    .check-item input[type="checkbox"] {
      width: 17px; height: 17px;
      margin-top: 2px;
      cursor: pointer;
      accent-color: #4f8ef7;
      flex-shrink: 0;
    }

    .check-label { display: flex; flex-direction: column; gap: 2px; }
    .check-label span { font-size: 15px; color: #1a1a1a; }
    .check-label small { font-size: 12px; color: #aaa; }

    .tag-default { display: flex; gap: 8px; flex-wrap: wrap; }
    .info-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f0f4ff;
      border: 1px solid #d0deff;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      color: #4f6fa8;
    }

    .email-box {
      background: #f9f9f9;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      font-size: 14px;
      line-height: 1.8;
      color: #1a1a1a;
      white-space: pre-wrap;
      min-height: 120px;
    }

    .empty-msg { font-size: 13px; color: #bbb; font-style: italic; }

    .btn-copy {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding: 9px 20px;
      font-size: 14px;
      cursor: pointer;
      background: #fff;
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      color: #333;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-copy:hover { background: #f0f4ff; border-color: #4f8ef7; color: #4f8ef7; }
    .btn-copy.visible { display: flex; }

    footer { text-align: center; font-size: 12px; color: #bbb; padding-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Gerador de e-mail fiscal</h1>

    <div class="card">
      <div class="section-title">Dados da empresa</div>
      <div class="field">
        <label for="cnpj">CNPJ</label>
        <input type="text" id="cnpj" placeholder="00.000.000/0000-00" />
      </div>
      <div class="field">
        <label for="razao">Razão social</label>
        <input type="text" id="razao" placeholder="Nome da empresa Ltda." />
      </div>
    </div>

    <div class="card">
      <div class="section-title">Módulos fiscais</div>
      <div class="check-group">
        <div class="group-block">
          <div class="group-block-label">📎 Escopo Fiscal Produtos.xlsx</div>
          <label class="check-item">
            <input type="checkbox" id="nfe" />
            <div class="check-label"><span>NF-e — Nota Fiscal Eletrônica</span></div>
          </label>
          <label class="check-item">
            <input type="checkbox" id="nfce" />
            <div class="check-label"><span>NFC-e — Nota Fiscal de Consumidor Eletrônica</span></div>
          </label>
        </div>
        <label class="check-item">
          <input type="checkbox" id="nfse" />
          <div class="check-label">
            <span>NFS-e — Nota Fiscal de Serviço Eletrônica</span>
            <small>📎 Escopo Fiscal Serviço.xlsx</small>
          </div>
        </label>
        <label class="check-item">
          <input type="checkbox" id="cte" />
          <div class="check-label">
            <span>CT-e — Conhecimento de Transporte Eletrônico</span>
            <small>📎 Escopo Fiscal CTE.xlsx</small>
          </div>
        </label>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Incluído por padrão</div>
      <div class="tag-default">
        <div class="info-tag">🔐 Certificado digital</div>
        <div class="info-tag">🔑 Senha do certificado</div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Assinatura</div>
      <div class="field">
        <label for="nome">Seu nome</label>
        <input type="text" id="nome" placeholder="Ex: Maykon" />
      </div>
    </div>

    <div class="card">
      <div class="section-title">E-mail gerado</div>
      <div id="email-output" class="email-box">
        <span class="empty-msg">Preencha os campos acima para gerar o e-mail.</span>
      </div>
      <button class="btn-copy" id="btn-copy">📋 Copiar e-mail</button>
    </div>

    <footer>Gerador de E-mail Fiscal</footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
